{% extends 'blog/base.html' %}

{% block content %}
<h3>Are you sure you want to delete this comment?</h3>

<p>{{ comment }}</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<form action="{% url 'article' comment.article.pk %}" method="get">
    <input type="submit" value="Cancel">
</form>
{% endblock %}
