{% extends 'blog/base.html' %}

{% block content %}
<h1>Create a new article</h1>

<main class="grid-container">
    <form method="post" enctype="multipart/form-data" action="{% url 'create_article' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create article</button>
    </form>
</main>
{% endblock %}
