<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>My account</title>
</head>
<body>
  <p><a href="{% url "project_home" %}">Home</a></p>

  <h1>My account</h1>
  <p>Your GeoGuesser account (only you can open this page).</p>

  <dl>
    <dt>Username</dt>
    <dd>{{ account.user.username }}</dd>
    <dt>Display name</dt>
    <dd>{{ account.display_name|default:"—" }}</dd>
    <dt>Member since</dt>
    <dd>{{ account.created_at }}</dd>
    <dt>Game sessions</dt>
    <dd>{{ session_count }} (<a href="{% url "gamesession_list" %}">view all</a>)</dd>
  </dl>
</body>
</html>
