{% extends "project/base.html" %}

{% block title %}Create Account · GeoGuesser{% endblock %}

{% block content %}
  <section class="auth-center">
    <h1>Create Account</h1>
    <p class="lead">Create a username and password for this game app.</p>

    <form method="post">
      {% csrf_token %}
      <fieldset>
        {{ form.as_p }}
      </fieldset>
      <div class="form-actions">
        <button type="submit">Create Account</button>
      </div>
    </form>
  </section>
{% endblock %}
