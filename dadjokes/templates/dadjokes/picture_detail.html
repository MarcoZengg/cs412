{% extends "dadjokes/base.html" %}
{% block title %}Picture #{{ picture.pk }}{% endblock %}
{% block content %}
<h1>Picture</h1>
<p><img class="dj-picture-square" src="{{ picture.image_url }}" alt="Silly picture"></p>
<p class="meta">By {{ picture.name }} — {{ picture.timestamp }}</p>
<p><a href="{% url 'dadjokes_pictures' %}">Back to all pictures</a></p>
{% endblock %}
