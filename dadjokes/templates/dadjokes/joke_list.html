{% extends "dadjokes/base.html" %}
{% block title %}All jokes{% endblock %}
{% block content %}
<h1>All jokes</h1>
{% if jokes %}
<ul>
    {% for j in jokes %}
    <li>
        <a href="{% url 'dadjokes_joke' j.pk %}">{{ j.text|truncatewords:15 }}</a>
        <span class="meta">— {{ j.name }}</span>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No jokes yet.</p>
{% endif %}
{% endblock %}
