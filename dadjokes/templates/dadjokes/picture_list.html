{% extends "dadjokes/base.html" %}
{% block title %}All pictures{% endblock %}
{% block content %}
<h1>All pictures</h1>
{% if pictures %}
<ul>
    {% for p in pictures %}
    <li>
        <a href="{% url 'dadjokes_picture' p.pk %}">Picture #{{ p.pk }}</a>
        <span class="meta">— {{ p.name }}</span>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No pictures yet.</p>
{% endif %}
{% endblock %}
