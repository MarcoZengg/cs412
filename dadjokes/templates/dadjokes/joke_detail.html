{% extends "dadjokes/base.html" %}
{% block title %}Joke #{{ joke.pk }}{% endblock %}
{% block content %}
<h1>Joke</h1>
<p>{{ joke.text }}</p>
<p class="meta">By {{ joke.name }} — {{ joke.timestamp }}</p>
<p><a href="{% url 'dadjokes_jokes' %}">Back to all jokes</a></p>
{% endblock %}
