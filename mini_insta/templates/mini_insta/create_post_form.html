{% extends 'mini_insta/base.html' %}

{% block content %}
<main class="main-content">
    <h1 class="page-title">New post</h1>
    <p class="page-lead">Add a caption and optional image files for your post.</p>

    <form method="post" action="{% url 'create_post' profile.pk %}" class="form-card card" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-body">
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <span class="form-hint">{{ field.help_text }}</span>
                {% endif %}
            </div>
            {% endfor %}
            <div class="form-group">
                <label for="files">Select photos <span class="form-optional">(optional)</span></label>
                <input type="file" name="files" id="files" multiple accept="image/*">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create post</button>
            <a href="{% url 'show_profile' profile.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</main>
{% endblock %}
